<!DOCTYPE html>
<html>
<head>
  <title>Water Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#2196f3">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    .container {
      padding: 15px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      text-align: center;
    }

    .stat h3 {
      margin: 5px 0;
      font-size: 22px;
    }

    .event {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .pump { background: #e3f2fd; color: #0d47a1; }
    .leak { background: #ffebee; color: #b71c1c; }
    .empty { background: #fff3e0; color: #e65100; }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/service-worker.js');
}
</script>

<body>

<div class="container">

  <h2>💧 Water Tank Monitor</h2>

  <!-- Stats -->
  <div class="grid">
    <div class="card stat">
      <h3 id="currentLevel">--%</h3>
      <p>Current Level</p>
    </div>

    <div class="card stat">
      <h3 id="dailyUsage">-- L</h3>
      <p>Today's Usage</p>
    </div>
  </div>

  <!-- Chart -->
  <div class="card">
    <h3>Usage Chart</h3>
    <canvas id="usageChart"></canvas>
  </div>

  <!-- Events -->
  <div class="card">
    <h3>🚨 Recent Events</h3>
    <div id="events"></div>
  </div>

</div>

<script>

// ✅ CORRECT IST conversion
function convertToIST(hour) {
  const now = new Date();

  const utcDate = new Date(Date.UTC(
    now.getUTCFullYear(),
    now.getUTCMonth(),
    now.getUTCDate(),
    hour
  ));

  return utcDate.toLocaleTimeString("en-IN", {
    timeZone: "Asia/Kolkata",
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  });
}

// 📊 Hourly usage
fetch('/api/hourly/')
.then(res => res.json())
.then(data => {

  const labels = data.map(d => convertToIST(d.hour));
  const values = data.map(d => d.usage_liters);

  new Chart(document.getElementById('usageChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Water Usage (Liters)',
        data: values,
        borderWidth: 2,
        tension: 0.4
      }]
    }
  });

});

// ✅ REAL-TIME current level
fetch('/api/current-level/')
.then(res => res.json())
.then(data => {
  document.getElementById('currentLevel').innerText =
    Math.round(data.level) + "%";
});

// 📊 Daily usage
fetch('/api/daily/')
.then(res => res.json())
.then(data => {
  document.getElementById('dailyUsage').innerText =
    Math.round(data.total_usage_liters) + " L";
});

// 🚨 Events (FIXED IST)
fetch('/api/events/')
.then(res => res.json())
.then(data => {
  const container = document.getElementById('events');

  container.innerHTML = "";

  data.reverse();

  data.forEach(e => {

    let typeClass = "pump";
    if (e.type === "leak") typeClass = "leak";
    if (e.type === "empty") typeClass = "empty";

    // ✅ Proper IST conversion
    let istTime = new Date(e.time).toLocaleTimeString("en-IN", {
      timeZone: "Asia/Kolkata",
      hour: "2-digit",
      minute: "2-digit",
      hour12: true
    });

    const div = document.createElement('div');
    div.className = `event ${typeClass}`;

    div.innerHTML = `
      <strong>${e.type.replace("_", " ").toUpperCase()}</strong><br>
      🕒 ${istTime}
    `;

    container.appendChild(div);
  });
});

</script>

</body>
</html>
