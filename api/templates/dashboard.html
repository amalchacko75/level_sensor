<!DOCTYPE html>
<html>
<head>
  <title>Water Tank Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <h2>Water Usage Dashboard</h2>

  <canvas id="usageChart" width="400" height="200"></canvas>

  <h3>Events</h3>
  <ul id="events"></ul>

<script>

// 📊 Fetch hourly data
fetch('/api/hourly/')
  .then(res => res.json())
  .then(data => {
    const labels = data.map(d => d.hour);
    const values = data.map(d => d.usage_liters);

    new Chart(document.getElementById('usageChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Water Usage (Liters)',
          data: values
        }]
      }
    });
  });

// 🚨 Fetch events
fetch('/api/events/')
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('events');

    data.forEach(e => {
      const li = document.createElement('li');
      li.innerText = `${e.type} at ${e.time}`;
      list.appendChild(li);
    });
  });

</script>

</body>
</html>
